<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join DYNEVEST | Secure Registration</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="/libs/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css">
    <style>
        body {
            background-color: #0b0e11;
            color: white;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .auth-card {
            background-color: #161a1e;
            border: 1px solid #1e2329;
            border-radius: 16px;
        }

        .form-control {
            background-color: #0b0e11;
            border: 1px solid #2b3139;
            color: white;
        }

        .form-control:focus {
            background-color: #0b0e11;
            color: white;
            border-color: #f0b90b;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none h3 fw-bold text-uppercase">
                        <span style="color: #f0b90b;">DYNE</span>VEST
                    </a>
                </div>

                <div class="auth-card p-4 p-lg-5 shadow-lg">
                    <h2 class="fw-bold mb-2">Create Account</h2>
                    <p class="text-secondary small mb-4">Start your journey into smart crypto investing.</p>

                    <form id="registrationForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Full Name</label>
                            <input type="text" class="form-control form-control-lg" placeholder="e.g. Samuel James"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Email Address</label>
                            <input type="email" class="form-control form-control-lg" placeholder="name@example.com"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Password</label>
                            <input type="password" class="form-control form-control-lg" required minlength="8">
                            <div class="form-text" style="font-size: 11px;">Must be at least 8 characters.</div>
                        </div>
                        <div class="mb-4">
                            <div class="form-check small">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label text-secondary" for="terms">
                                    I agree to the <a href="#" class="text-warning text-decoration-none">Terms &
                                        Conditions</a>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-3 mb-3"
                            style="background-color: #f0b90b;">Register Now</button>
                        <p class="text-center small text-secondary">
                            Already have an account? <a href="/pages/login.html"
                                class="text-warning text-decoration-none">Login</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Bootstrap validation script
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

</body>

</html>
