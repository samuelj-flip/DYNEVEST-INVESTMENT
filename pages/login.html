<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DYNEVEST</title>
    <link rel="stylesheet" href="/libs/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body {
            background-color: #0b0e11;
            color: white;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .auth-card {
            background-color: #161a1e;
            border: 1px solid #1e2329;
            border-radius: 16px;
        }

        .form-control {
            background-color: #0b0e11;
            border: 1px solid #2b3139;
            color: white;
        }

        .form-control:focus {
            background-color: #0b0e11;
            color: white;
            border-color: #f0b90b;
            box-shadow: none;
        }

        .text-warning-hover:hover {
            color: #f0b90b !important;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="/index.html" class="text-decoration-none h3 fw-bold text-uppercase">
                        <span style="color: #f0b90b;">DYNE</span>VEST
                    </a>
                </div>

                <div class="auth-card p-4 p-md-5 shadow-lg">
                    <h2 class="fw-bold mb-2">Welcome Back</h2>
                    <p class="text-secondary small mb-4">Sign in to manage your digital assets and daily yields.</p>

                    <form action="#" method="POST" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Email Address</label>
                            <input type="email" class="form-control form-control-lg" placeholder="name@example.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <label class="form-label small text-secondary">Password</label>
                                <a href="#"
                                    class="text-warning small text-decoration-none text-warning-hover">Forgot?</a>
                            </div>
                            <input type="password" class="form-control form-control-lg" required minlength="8">
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small text-secondary" for="remember">Remember this
                                device</label>
                        </div>

                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold py-3 mb-3"
                            style="background-color: #f0b90b; border: none;">Sign In</button>

                        <p class="text-center small text-secondary">
                            Don't have an account? <a href="register.html"
                                class="text-warning text-decoration-none text-warning-hover">Register Now</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Pure Vanilla JS Bootstrap Client-side Validation
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

</body>

</html>
